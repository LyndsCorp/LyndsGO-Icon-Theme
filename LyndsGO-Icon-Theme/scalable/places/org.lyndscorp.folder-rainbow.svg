<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arcoíris más oscuro para la pestaña -->
    <linearGradient id="tabGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#990000"/>
      <stop offset="16.66%" stop-color="#b35a00"/>
      <stop offset="33.33%" stop-color="#b3b300"/>
      <stop offset="50%" stop-color="#006b2d"/>
      <stop offset="66.66%" stop-color="#000099"/>
      <stop offset="83.33%" stop-color="#5f2a8a"/>
      <stop offset="100%" stop-color="#80001f"/>
    </linearGradient>

    <!-- Arcoíris normal para el cuerpo -->
    <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e40303"/>
      <stop offset="16.66%" stop-color="#ff8c00"/>
      <stop offset="33.33%" stop-color="#ffff00"/>
      <stop offset="50%" stop-color="#00b050"/>
      <stop offset="66.66%" stop-color="#0000ff"/>
      <stop offset="83.33%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#c60c30"/>
    </linearGradient>
  </defs>

  <!-- Base de la carpeta (la pestaña queda visible) -->
  <path d="M20,60 L240,60 C260,60 270,70 280,90 L300,130 L490,130 C500,130 510,140 510,150 L510,480 C510,490 500,500 490,500 L20,500 C10,500 0,490 0,480 L0,80 C0,70 10,60 20,60 Z"
        fill="url(#tabGradient)"/>

  <!-- Cuerpo de la carpeta -->
  <path d="M20,130 L490,130 C500,130 510,140 510,150 L510,480 C510,490 500,500 490,500 L20,500 C10,500 0,490 0,480 L0,130 Z"
        fill="url(#rainbowGradient)"/>
</svg>
